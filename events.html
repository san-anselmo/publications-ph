<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="js/theme-init.js?v=1.0.66"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#8C3D1F" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://docs.google.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:; iframe-src 'self' https://*.facebook.com https://*.google.com; connect-src 'self' https://docs.google.com https://*.gumroad.com https://sananselmopress.gumroad.com;"
    />
    <meta
      name="description"
      content="Upcoming and past events from San Anselmo Publications — book fairs, launches, signings, and outreach."
    />
    <title>Events — San Anselmo Publications, Inc.</title>
    <link rel="preconnect" href="https://docs.google.com" crossorigin />
    <link
      rel="preconnect"
      href="https://sananselmopress.gumroad.com"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="prefetch" href="index.html" />
    <link rel="stylesheet" href="css/styles.css?v=1.0.66" />
    <link rel="manifest" href="manifest.json?v=1.0.66" />
    <script src="js/error-logger.js" defer></script>
    <script src="data/fallback-data.js?v=1.0.66" defer></script>
    <script src="js/sheets-cms.js?v=1.0.66" defer></script>
    <script src="js/components.js?v=1.0.66" defer></script>
    <script src="js/events.js?v=1.0.66" defer></script>
  </head>
  <body data-page="events">
    <div id="navContainer"></div>
    <div class="page-body">
      <main class="main-content" id="mainContent" role="main">
        <section
          class="content-section active"
          aria-label="Events and Appearances"
        >
          <div class="section-inner">
            <header class="page-header">
              <h1 class="page-title">
                Events &amp; <span class="accent">Appearances</span>
              </h1>
              <p class="page-subtitle">Book fairs, launches, and outreach</p>
            </header>
            <div class="events-layout-container" id="eventsLayoutContainer">
              <div id="singleEventView" class="hidden"></div>
              <div id="eventsGridWrapper">
                <div
                  class="events-filter-row"
                  role="group"
                  aria-label="Event filters"
                >
                  <span class="events-filter-lbl">When</span>
                  <button class="evt-filter-btn active" id="efUpcoming">
                    Upcoming
                  </button>
                  <button class="evt-filter-btn" id="efPast">Past</button>
                  <button class="evt-filter-btn" id="efAll">All</button>
                  <div class="events-divider" aria-hidden="true"></div>
                  <span class="events-filter-lbl">Type</span>
                  <div class="cs-wrap evt-type-wrap">
                    <button
                      class="cs-btn"
                      id="evtTypeBtn"
                      aria-expanded="false"
                    >
                      <span id="evtTypeLabel">All</span>
                      <svg class="icon" aria-hidden="true" focusable="false">
                        <use href="#icon-chevron"></use>
                      </svg>
                    </button>
                    <div class="cs-opts" id="evtTypeOpts" role="listbox"></div>
                  </div>
                </div>
                <div class="events-list" id="eventsList" role="list">
                  <div class="flex-center" style="padding: 4rem 0; width: 100%">
                    <div class="loading-spinner"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
