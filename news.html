<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="js/theme-init.js?v=1.0.66"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#8C3D1F" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://docs.google.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:; iframe-src 'self' https://*.facebook.com https://*.google.com; connect-src 'self' https://docs.google.com https://*.gumroad.com https://sananselmopress.gumroad.com;"
    />
    <meta
      name="description"
      content="Latest news and announcements from San Anselmo Publications, Inc. Follow us on Facebook."
    />
    <title>News — San Anselmo Publications, Inc.</title>
    <link rel="preconnect" href="https://docs.google.com" crossorigin />
    <link
      rel="preconnect"
      href="https://sananselmopress.gumroad.com"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="prefetch" href="index.html" />
    <link rel="stylesheet" href="css/styles.css?v=1.0.66" />
    <link rel="manifest" href="manifest.json?v=1.0.66" />
    <script src="js/error-logger.js" defer></script>
    <script src="data/fallback-data.js?v=1.0.66" defer></script>
    <script src="js/components.js?v=1.0.66" defer></script>
  </head>
  <body data-page="news">
    <div id="navContainer"></div>
    <div class="page-body">
      <main class="main-content" id="mainContent" role="main">
        <section
          class="content-section active"
          aria-label="News and Announcements"
        >
          <div class="section-inner">
            <header class="page-header">
              <h1 class="page-title">
                News &amp; <span class="accent">Announcements</span>
              </h1>
              <p class="page-subtitle">What's happening at San Anselmo</p>
            </header>
            <div class="news-container-grid">
              <div class="news-articles-col" id="newsListCol">
                <div class="flex-center" style="padding: 4rem 0; width: 100%">
                  <div class="loading-spinner"></div>
                </div>
              </div>
              <div class="news-fb-col">
                <div class="news-fb-hero-card">
                  <div class="news-fb-hero-label">
                    <svg class="icon" aria-hidden="true" focusable="false">
                      <use href="#icon-facebook"></use>
                    </svg>
                    Follow us on Facebook
                  </div>
                  <div class="news-fb-hero-frame">
                    <!-- Facebook iframe: uses data-src + IntersectionObserver for zero initial load cost -->
                    <iframe
                      id="fbEmbed"
                      data-src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fsananselmopress&tabs=timeline&width=500&height=680&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"
                      width="500"
                      height="680"
                      class="iframe-clean"
                      scrolling="no"
                      frameborder="0"
                      allowfullscreen="true"
                      allow="
                        autoplay;
                        clipboard-write;
                        encrypted-media;
                        picture-in-picture;
                        web-share;
                      "
                      title="San Anselmo Facebook Page"
                      loading="lazy"
                    >
                    </iframe>
                  </div>
                  <div class="news-fb-hero-footer">
                    <a
                      href="https://www.facebook.com/sananselmopress"
                      target="_blank"
                      rel="noopener"
                      class="news-fb-hero-cta"
                    >
                      <svg class="icon" aria-hidden="true" focusable="false">
                        <use href="#icon-facebook"></use>
                      </svg>
                      Open Full Page
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
